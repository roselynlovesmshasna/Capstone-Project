<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Store</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <div class="nav-search">
      <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off" />
      <button id="searchBtn"><i class="fas fa-search"></i></button>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
    <div class="nav-actions">
      <a href="/cart.html" class="nav-btn">Cart</a>
      <a href="/points.html" class="nav-btn">Points</a>
      <a href="/comments.html" class="nav-btn">Comments</a>
    </div>
    <div class="nav-logo">
      <img src="logo.png" alt="Logo" />
    </div>
  </nav>

  <!-- ── Welcome Message ── -->
  <div class="welcome-message">
    <p>Welcome to My Store — happy shopping!</p>
  </div>

  <!-- ── Hero Slider ── -->
  <section class="slider">
    <div class="slides">
      <div class="slide active">
        <img src="https://placehold.co/1400x480/4f46e5/ffffff?text=New+Items+1" alt="Slide 1" />
      </div>
      <div class="slide">
        <img src="https://placehold.co/1400x480/7c3aed/ffffff?text=New+Items+2" alt="Slide 2" />
      </div>
      <div class="slide">
        <img src="https://placehold.co/1400x480/0ea5e9/ffffff?text=New+Items+3" alt="Slide 3" />
      </div>
      <div class="slide">
        <img src="https://placehold.co/1400x480/10b981/ffffff?text=New+Items+4" alt="Slide 4" />
      </div>
      <div class="slide">
        <img src="https://placehold.co/1400x480/f59e0b/ffffff?text=New+Items+5" alt="Slide 5" />
      </div>
      <div class="slide">
        <img src="https://placehold.co/1400x480/ef4444/ffffff?text=New+Items+6" alt="Slide 6" />
      </div>
    </div>
    <button class="slider-btn prev" id="prev"><i class="fas fa-chevron-left"></i></button>
    <button class="slider-btn next" id="next"><i class="fas fa-chevron-right"></i></button>
    <div class="slider-dots">
      <span class="dot active" data-index="0"></span>
      <span class="dot" data-index="1"></span>
      <span class="dot" data-index="2"></span>
      <span class="dot" data-index="3"></span>
      <span class="dot" data-index="4"></span>
      <span class="dot" data-index="5"></span>
    </div>
  </section>

  <!-- ── Bottom Section ── -->
  <section class="bottom-section">
    <div class="product-cards" id="productCards">
      <!-- JS fills two featured cards here -->
    </div>
    <div class="shopping-list">
      <h2>Shopping List</h2>
      <ul class="list-items" id="shoppingList">
        <!-- JS fills four list items here -->
      </ul>
      <button class="buy-all-btn" id="buyAllBtn">Buy All</button>
    </div>
  </section>

  <script src="/script.js"></script>
</body>
</html>
